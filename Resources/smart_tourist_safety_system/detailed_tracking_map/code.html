<body class="bg-background text-on-background h-screen w-screen overflow-hidden flex flex-col font-body-md text-body-md">
<!-- TopAppBar -->
<header class="bg-slate-50 dark:bg-slate-900 border-b border-slate-200 dark:border-slate-800 flex justify-between items-center w-full px-5 h-16 z-10 shrink-0">
<div class="flex items-center gap-2">
<span class="material-symbols-outlined text-slate-900 dark:text-slate-50" data-icon="shield_with_heart" data-weight="fill" style="font-variation-settings: 'FILL' 1;">shield_with_heart</span>
<h1 class="text-xl font-black text-slate-900 dark:text-white uppercase tracking-wider">TouristSafe</h1>
</div>
<button class="hover:bg-slate-100 dark:hover:bg-slate-800 transition-colors p-2 rounded-full flex items-center justify-center opacity-80 duration-150">
<span class="material-symbols-outlined text-slate-900 dark:text-slate-50" data-icon="notifications">notifications</span>
</button>
</header>
<!-- Main Content Area (Map) -->
<main class="flex-grow relative overflow-hidden bg-surface-container-highest">
<!-- Placeholder for Map Image/Texture -->
<div class="absolute inset-0 bg-cover bg-center" data-alt="high detail topographical map showing elevation lines, natural terrain, light grey and green hues, realistic map texture, overhead view" style="background-image: url('https://lh3.googleusercontent.com/aida-public/AB6AXuAJyhbWrW7Mus7deHMGMrUEGuH64k7ahRWX2-7m2HoO8TZbeBLAn3WBWaB8tDl4OLvwglYILzdSv02JsvYEZvDQc-qk0-1N0mDTlp-yj-4qazkgOY3cb1fxBDLzuU7Jn3SggIgatB_m21jr6-n-i7FkyRr9bRQakAg9laT_grb-8-IncMOdLTkVi4g3iVAiB6wwYySBmDSNgrwpoUpKpCdCfE_uSslZGxeRvEqb_k1EojTPIJY4siqiDcVHA2GRoX4v8h5S6EfLgQ'); opacity: 0.8;"></div>
<!-- Danger Zone 1: Steep Terrain -->
<div class="absolute top-[20%] left-[15%] w-48 h-48 bg-error/20 rounded-full border border-error/50 flex items-center justify-center pointer-events-none">
<div class="bg-error text-on-error px-3 py-1 rounded-full font-label-sm text-label-sm shadow-md whitespace-nowrap">
                Steep Terrain
            </div>
</div>
<!-- Danger Zone 2: Restricted Area -->
<div class="absolute bottom-[35%] right-[20%] w-64 h-64 bg-error/20 rounded-full border border-error/50 flex items-center justify-center pointer-events-none">
<div class="bg-error text-on-error px-3 py-1 rounded-full font-label-sm text-label-sm shadow-md whitespace-nowrap">
                Restricted Area
            </div>
</div>
<!-- User Location Pin -->
<div class="absolute top-[50%] left-[50%] -translate-x-1/2 -translate-y-1/2 flex flex-col items-center">
<div class="w-16 h-16 bg-primary/20 rounded-full animate-pulse flex items-center justify-center absolute"></div>
<div class="w-6 h-6 bg-primary border-2 border-on-primary rounded-full shadow-lg z-10 relative"></div>
</div>
<!-- Floating Controls Area -->
<div class="absolute top-container-margin right-container-margin flex flex-col gap-stack-sm z-20">
<button class="w-12 h-12 bg-surface-container-lowest rounded-full shadow-md flex items-center justify-center text-primary hover:bg-surface-container-low transition-colors">
<span class="material-symbols-outlined" data-icon="layers">layers</span>
</button>
</div>
<!-- Recenter Button -->
<button class="absolute bottom-[100px] right-container-margin w-12 h-12 bg-surface-container-lowest rounded-full shadow-md flex items-center justify-center text-primary hover:bg-surface-container-low transition-colors z-20">
<span class="material-symbols-outlined" data-icon="my_location">my_location</span>
</button>
<!-- Status Overlay -->
<div class="absolute bottom-[100px] left-container-margin z-20">
<div class="bg-surface-container-lowest rounded-xl p-3 shadow-md border-l-4 border-l-[#10B981] flex items-center gap-3">
<div class="w-8 h-8 rounded-full bg-[#D1FAE5] flex items-center justify-center text-[#059669]">
<span class="material-symbols-outlined text-[20px]" data-icon="verified_user">verified_user</span>
</div>
<div>
<p class="font-label-sm text-label-sm text-on-surface-variant uppercase tracking-wider">Safety Status</p>
<p class="font-label-md text-label-md text-on-surface">Secure</p>
</div>
</div>
</div>
</main>
<!-- BottomNavBar -->
<nav class="fixed bottom-0 w-full z-50 flex justify-around items-center px-4 h-20 pb-safe bg-white dark:bg-slate-950 border-t border-slate-200 dark:border-slate-800 shadow-[0_-4px_12px_rgba(15,23,42,0.08)]">

<a class="flex flex-col items-center justify-center text-slate-400 dark:text-slate-500 p-2 hover:text-slate-600 dark:hover:text-slate-300" href="#">

<span class="font-sans text-[11px] font-semibold uppercase tracking-tighter">Dashboard</span>
</a>
<!-- Tracking (Active) -->
<a class="flex flex-col items-center justify-center text-slate-900 dark:text-white bg-slate-100 dark:bg-slate-800 rounded-xl px-3 py-1 scale-95 transition-transform duration-200" href="#">
<span class="material-symbols-outlined mb-1" data-icon="explore" data-weight="fill" style="font-variation-settings: 'FILL' 1;">explore</span>
<span class="font-sans text-[11px] font-semibold uppercase tracking-tighter">Tracking</span>
</a>
<!-- Emergency (Inactive) -->
<a class="flex flex-col items-center justify-center text-slate-400 dark:text-slate-500 p-2 hover:text-slate-600 dark:hover:text-slate-300" href="#">
<span class="material-symbols-outlined mb-1" data-icon="emergency_share">emergency_share</span>
<span class="font-sans text-[11px] font-semibold uppercase tracking-tighter">Emergency</span>
</a>
<!-- Settings (Inactive) -->
<a class="flex flex-col items-center justify-center text-slate-400 dark:text-slate-500 p-2 hover:text-slate-600 dark:hover:text-slate-300" href="#">
<span class="material-symbols-outlined mb-1" data-icon="settings">settings</span>
<span class="font-sans text-[11px] font-semibold uppercase tracking-tighter">Settings</span>
</a>
</nav>

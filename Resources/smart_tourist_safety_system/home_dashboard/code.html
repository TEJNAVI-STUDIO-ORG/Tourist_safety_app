<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>TouristSafe - Dashboard</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "on-primary-container": "#7c839b",
                        "on-secondary-container": "#5c2400",
                        "inverse-on-surface": "#eff1f3",
                        "surface-container-lowest": "#ffffff",
                        "tertiary-fixed": "#ffdad6",
                        "primary-fixed": "#dae2fd",
                        "tertiary-container": "#410002",
                        "primary-container": "#131b2e",
                        "on-tertiary-container": "#f63a35",
                        "on-primary-fixed": "#131b2e",
                        "secondary": "#9d4300",
                        "on-tertiary-fixed-variant": "#93000b",
                        "outline-variant": "#c6c6cd",
                        "inverse-surface": "#2d3133",
                        "secondary-container": "#fd761a",
                        "surface-bright": "#f7f9fb",
                        "on-tertiary": "#ffffff",
                        "error": "#ba1a1a",
                        "on-surface": "#191c1e",
                        "surface-container-highest": "#e0e3e5",
                        "surface-container": "#eceef0",
                        "surface-tint": "#565e74",
                        "tertiary-fixed-dim": "#ffb4ab",
                        "outline": "#76777d",
                        "on-secondary-fixed-variant": "#783200",
                        "surface-container-low": "#f2f4f6",
                        "primary-fixed-dim": "#bec6e0",
                        "secondary-fixed": "#ffdbca",
                        "surface-dim": "#d8dadc",
                        "on-primary": "#ffffff",
                        "background": "#f7f9fb",
                        "on-secondary": "#ffffff",
                        "surface-container-high": "#e6e8ea",
                        "tertiary": "#000000",
                        "error-container": "#ffdad6",
                        "on-error": "#ffffff",
                        "on-primary-fixed-variant": "#3f465c",
                        "secondary-fixed-dim": "#ffb690",
                        "on-secondary-fixed": "#341100",
                        "on-error-container": "#93000a",
                        "surface-variant": "#e0e3e5",
                        "inverse-primary": "#bec6e0",
                        "on-surface-variant": "#45464d",
                        "on-tertiary-fixed": "#410002",
                        "surface": "#f7f9fb",
                        "primary": "#000000",
                        "on-background": "#191c1e"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "spacing": {
                        "stack-md": "16px",
                        "stack-sm": "8px",
                        "container-margin": "20px",
                        "gutter": "16px",
                        "unit": "4px",
                        "stack-lg": "24px"
                    },
                    "fontFamily": {
                        "label-md": ["Inter"],
                        "body-md": ["Inter"],
                        "headline-lg": ["Inter"],
                        "headline-sm": ["Inter"],
                        "headline-md": ["Inter"],
                        "label-sm": ["Inter"],
                        "body-lg": ["Inter"]
                    },
                    "fontSize": {
                        "label-md": ["14px", { "lineHeight": "20px", "fontWeight": "600" }],
                        "body-md": ["16px", { "lineHeight": "24px", "fontWeight": "400" }],
                        "headline-lg": ["32px", { "lineHeight": "40px", "letterSpacing": "-0.02em", "fontWeight": "700" }],
                        "headline-sm": ["20px", { "lineHeight": "28px", "fontWeight": "600" }],
                        "headline-md": ["24px", { "lineHeight": "32px", "letterSpacing": "-0.01em", "fontWeight": "600" }],
                        "label-sm": ["12px", { "lineHeight": "16px", "fontWeight": "500" }],
                        "body-lg": ["18px", { "lineHeight": "28px", "fontWeight": "400" }]
                    }
                }
            }
        }
    </script>
<style>
        .pb-safe { padding-bottom: env(safe-area-inset-bottom); }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background text-on-background min-h-screen pb-24">
<!-- TopAppBar -->
<header class="docked full-width top-0 border-b border-slate-200 dark:border-slate-800 flat no shadows bg-slate-50 dark:bg-slate-900 flex justify-between items-center w-full px-5 h-16 sticky z-40">
<div class="flex items-center gap-3">
<span class="material-symbols-outlined text-primary" style="font-variation-settings: 'FILL' 1;">shield_with_heart</span>
<h1 class="text-xl font-black text-slate-900 dark:text-white uppercase tracking-wider">TouristSafe</h1>
</div>
<button class="w-10 h-10 flex items-center justify-center rounded-full hover:bg-slate-100 dark:hover:bg-slate-800 transition-colors opacity-100 active:opacity-80 duration-150">
<span class="material-symbols-outlined text-slate-900 dark:text-slate-50">notifications</span>
</button>
</header>
<!-- Main Canvas -->
<main class="p-container-margin space-y-stack-lg max-w-2xl mx-auto">
<!-- Device Status Card -->
<section class="bg-surface-container-lowest rounded-xl p-5 shadow-[0_4px_12px_rgba(15,23,42,0.04)] border-l-4 border-green-500">
<div class="flex justify-between items-start mb-4">
<div>
<h2 class="font-headline-sm text-headline-sm text-on-surface mb-1">Device Status</h2>
<div class="flex items-center gap-2 text-green-600 bg-green-50 px-2 py-1 rounded-md inline-flex">
<span class="material-symbols-outlined text-sm">pulse_alert</span>
<span class="font-label-sm text-label-sm">Online</span>
</div>
</div>
<!-- Toggle -->
<div class="flex items-center gap-2">
<span class="font-label-sm text-label-sm text-on-surface-variant">Private</span>
<button class="w-11 h-6 bg-surface-container-highest rounded-full relative flex items-center p-1 cursor-pointer">
<div class="w-4 h-4 bg-white rounded-full shadow-sm transform transition-transform duration-200"></div>
</button>
</div>
</div>
<!-- Battery -->
<div>
<div class="flex justify-between text-sm mb-2">
<span class="font-label-sm text-label-sm text-on-surface-variant">IoT Battery</span>
<span class="font-label-md text-label-md text-on-surface">85%</span>
</div>
<div class="w-full bg-surface-container-highest rounded-full h-2">
<div class="bg-primary h-2 rounded-full" style="width: 85%"></div>
</div>
</div>
</section>
<!-- Quick Map -->
<section class="bg-surface-container-lowest rounded-xl overflow-hidden shadow-[0_4px_12px_rgba(15,23,42,0.04)]">
<div class="p-4 border-b border-surface-variant">
<h2 class="font-headline-sm text-headline-sm text-on-surface">Current Location</h2>
<p class="font-body-md text-body-md text-on-surface-variant">Monitoring safe zones</p>
</div>
<div class="relative w-full h-48 bg-surface-container">
<!-- Map placeholder via image -->
<img alt="Map" class="w-full h-full object-cover opacity-80" data-alt="Clean minimal street map view showing a city grid with soft grey tones and clear arterial roads, bright daylight" data-location="Paris" src="https://lh3.googleusercontent.com/aida-public/AB6AXuDX_57xDW8gU45TFcRIrubVOY0Y7yTdqumkSmmRjVaMZF8FKhm5kKLiuAQ8d-TdmebuifTXiw6yEaOVsJdvB7TFQJg0853ggIQvncRI1Ofx0s91cx4Cf2sfaMEk6dnzJfQu4QfLluLJlDRLmYU1DRnstjEcccN8Tt9CHiSfPYmIfTvaBy3JHlP1z77VpHofPLLvEOfTR9erVofyQVTpaDyf5b5JtoACNM6RWOtQ-Yu8BxlwwXP1HJ2bXbFTGnSsByP6l1j5pf4t7A"/>
<!-- Danger Zone Overlay -->
<div class="absolute top-1/4 right-1/3 w-16 h-16 bg-error/20 rounded-full border border-error flex items-center justify-center animate-pulse">
<div class="w-8 h-8 bg-error/40 rounded-full"></div>
</div>
<!-- Current Location Marker -->
<div class="absolute bottom-1/3 left-1/2 transform -translate-x-1/2 translate-y-1/2 flex flex-col items-center">
<div class="w-4 h-4 bg-primary rounded-full border-2 border-white shadow-md"></div>
</div>
</div>
</section>
<!-- SOS Section -->
<section class="flex justify-center mt-stack-lg">
<button class="bg-[#DC2626] text-white rounded-full w-48 h-48 flex flex-col items-center justify-center shadow-[0_8px_32px_rgba(220,38,38,0.4)] active:scale-95 transition-transform duration-200">
<span class="material-symbols-outlined text-[64px] mb-2" style="font-variation-settings: 'FILL' 1;">shield</span>
<span class="font-headline-md text-headline-md uppercase tracking-widest">SOS</span>
</button>
</section>
</main>
<!-- BottomNavBar -->
<nav class="docked full-width bottom-0 border-t border-slate-200 dark:border-slate-800 shadow-[0_-4px_12px_rgba(15,23,42,0.08)] bg-white dark:bg-slate-950 fixed bottom-0 w-full z-50 flex justify-around items-center px-4 h-20 pb-safe md:hidden">
<!-- Dashboard (Active) -->
<a class="flex flex-col items-center justify-center text-slate-900 dark:text-white bg-slate-100 dark:bg-slate-800 rounded-xl px-3 py-1 scale-95 transition-transform duration-200" href="#">
<span class="material-symbols-outlined mb-1" style="font-variation-settings: 'FILL' 1;">dashboard</span>
<span class="font-sans text-[11px] font-semibold uppercase tracking-tighter">Dashboard</span>
</a>
<!-- Tracking -->
<a class="flex flex-col items-center justify-center text-slate-400 dark:text-slate-500 p-2 hover:text-slate-600 dark:hover:text-slate-300" href="#">
<span class="material-symbols-outlined mb-1">explore</span>
<span class="font-sans text-[11px] font-semibold uppercase tracking-tighter">Tracking</span>
</a>
<!-- Emergency -->
<a class="flex flex-col items-center justify-center text-slate-400 dark:text-slate-500 p-2 hover:text-slate-600 dark:hover:text-slate-300" href="#">
<span class="material-symbols-outlined mb-1">emergency_share</span>
<span class="font-sans text-[11px] font-semibold uppercase tracking-tighter">Emergency</span>
</a>
<!-- Settings -->
<a class="flex flex-col items-center justify-center text-slate-400 dark:text-slate-500 p-2 hover:text-slate-600 dark:hover:text-slate-300" href="#">
<span class="material-symbols-outlined mb-1">settings</span>
<span class="font-sans text-[11px] font-semibold uppercase tracking-tighter">Settings</span>
</a>
</nav>
</body></html>
